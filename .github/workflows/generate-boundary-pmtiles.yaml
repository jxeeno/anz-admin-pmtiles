name: Generate Boundaries PMTiles

on:
  workflow_dispatch:
    inputs:
      overture_release:
        description: "Overture Maps release (e.g. 2026-02-18.0). Leave empty to use latest."
        required: false
        default: ""
  schedule:
    # Run monthly to pick up Overture Maps updates
    - cron: '0 0 1 * *'

permissions:
  contents: write

env:
  PIP_ZOOM: 18
  RENDER_MIN_ZOOM: 4
  RENDER_MAX_ZOOM: 14

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve Overture release
        id: release
        run: |
          INPUT_RELEASE="${{ github.event.inputs.overture_release }}"
          if [ -n "$INPUT_RELEASE" ]; then
            echo "Using manually specified release: $INPUT_RELEASE"
            echo "version=$INPUT_RELEASE" >> "$GITHUB_OUTPUT"
          else
            echo "Discovering latest release from STAC catalog..."
            LATEST=$(curl -s https://stac.overturemaps.org | jq -r '.latest')
            echo "Discovered latest release: $LATEST"
            echo "version=$LATEST" >> "$GITHUB_OUTPUT"
          fi

      - name: Install DuckDB
        run: |
          DUCKDB_VERSION="v1.2.1"
          wget -q "https://github.com/duckdb/duckdb/releases/download/${DUCKDB_VERSION}/duckdb_cli-linux-amd64.zip"
          unzip duckdb_cli-linux-amd64.zip
          chmod +x duckdb
          sudo mv duckdb /usr/local/bin/

      - name: Install Tippecanoe
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential libsqlite3-dev zlib1g-dev
          git clone https://github.com/felt/tippecanoe.git
          cd tippecanoe
          make -j$(nproc)
          sudo make install

      - name: Extract divisions from Overture Maps
        env:
          OVERTURE_RELEASE: ${{ steps.release.outputs.version }}
        run: |
          echo "Using Overture release: $OVERTURE_RELEASE"

          SUBTYPES=("locality" "county" "region" "country")
          for SUBTYPE in "${SUBTYPES[@]}"; do
            echo "Extracting ${SUBTYPE}..."
            duckdb -c "
              INSTALL spatial;
              INSTALL httpfs;
              LOAD spatial;
              LOAD httpfs;
              SET s3_region = 'us-west-2';

              COPY (
                  SELECT
                      id,
                      names.primary AS name,
                      subtype,
                      admin_level,
                      geometry
                  FROM read_parquet(
                      's3://overturemaps-us-west-2/release/${OVERTURE_RELEASE}/theme=divisions/type=division_area/*'
                  )
                  WHERE country IN ('AU', 'NZ')
                    AND subtype = '${SUBTYPE}'
              ) TO '${SUBTYPE}.geojson'
              WITH (FORMAT GDAL, DRIVER 'GeoJSON');
            "
            echo "${SUBTYPE} features: $(grep -c '"Feature"' ${SUBTYPE}.geojson || echo '0')"
          done

      - name: Export CSV (without geometry)
        env:
          OVERTURE_RELEASE: ${{ steps.release.outputs.version }}
        run: |
          duckdb -c "
            INSTALL spatial;
            INSTALL httpfs;
            LOAD spatial;
            LOAD httpfs;
            SET s3_region = 'us-west-2';

            COPY (
                SELECT
                    id,
                    names.primary AS name,
                    country,
                    subtype,
                    admin_level
                FROM read_parquet(
                    's3://overturemaps-us-west-2/release/${OVERTURE_RELEASE}/theme=divisions/type=division_area/*'
                )
                WHERE country IN ('AU', 'NZ')
                  AND subtype IN ('locality', 'county', 'region', 'country')
                ORDER BY country, subtype, name
            ) TO 'boundaries.csv'
            WITH (HEADER, DELIMITER ',');
          "
          echo "CSV rows: $(wc -l < boundaries.csv)"

      - name: Generate PIP PMTiles (single zoom, full precision)
        run: |
          tippecanoe \
            --output=boundaries-pip.pmtiles \
            --name="AU/NZ Boundaries (PIP)" \
            --description="High-precision boundaries for point-in-polygon queries" \
            --attribution="© OpenStreetMap contributors, Overture Maps Foundation" \
            --minimum-zoom=${PIP_ZOOM} \
            --maximum-zoom=${PIP_ZOOM} \
            --no-feature-limit \
            --no-tile-size-limit \
            --no-tile-compression \
            --detect-shared-borders \
            --no-simplification-of-shared-nodes \
            --simplification=1 \
            --force \
            --named-layer=locality:locality.geojson \
            --named-layer=county:county.geojson \
            --named-layer=region:region.geojson \
            --named-layer=country:country.geojson

          echo "PIP PMTiles size: $(du -h boundaries-pip.pmtiles | cut -f1)"

      - name: Generate render PMTiles (multiple zooms, simplified)
        run: |
          tippecanoe \
            --output=boundaries-render.pmtiles \
            --name="AU/NZ Boundaries (Render)" \
            --description="Boundaries optimised for map rendering" \
            --attribution="© OpenStreetMap contributors, Overture Maps Foundation" \
            --minimum-zoom=${RENDER_MIN_ZOOM} \
            --maximum-zoom=${RENDER_MAX_ZOOM} \
            --no-feature-limit \
            --no-tile-size-limit \
            --detect-shared-borders \
            --no-simplification-of-shared-nodes \
            --force \
            --named-layer=locality:locality.geojson \
            --named-layer=county:county.geojson \
            --named-layer=region:region.geojson \
            --named-layer=country:country.geojson

          echo "Render PMTiles size: $(du -h boundaries-render.pmtiles | cut -f1)"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: boundaries-${{ steps.release.outputs.version }}
          name: Boundaries - Overture ${{ steps.release.outputs.version }}
          body: |
            AU/NZ administrative boundaries from Overture Maps release `${{ steps.release.outputs.version }}`.

            **boundaries-pip.pmtiles** — Point-in-polygon queries
            - Single zoom level: ${{ env.PIP_ZOOM }}
            - No tile compression, no simplification
            - Optimised for spatial lookup accuracy (~0.5m)

            **boundaries-render.pmtiles** — Map rendering
            - Zoom levels: ${{ env.RENDER_MIN_ZOOM }}–${{ env.RENDER_MAX_ZOOM }}
            - Standard simplification for smaller file size
            - Optimised for visual display

            **boundaries.csv** — Flat lookup table
            - All divisions without geometry
            - Columns: id, name, country, subtype, admin_level

            **Layers:** locality, county, region, country
            **Source:** Overture Maps divisions theme
          files: |
            boundaries-pip.pmtiles
            boundaries-render.pmtiles
            boundaries.csv
